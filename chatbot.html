<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Safegaze Chatbot</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        body {
            margin: 0;
            background: #0f172a;
            color: white;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }
        #chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            background: #1e293b;
        }
        .message {
            margin-bottom: 12px;
            padding: 10px 14px;
            border-radius: 8px;
            max-width: 80%;
            clear: both;
            word-wrap: break-word;
        }
        .user {
            background: #0ea5e9;
            color: white;
            float: right;
            text-align: right;
        }
        .bot {
            background: #334155;
            color: white;
            float: left;
            text-align: left;
        }
        #input-area {
            display: flex;
            padding: 10px;
            background: #0f172a;
            border-top: 1px solid #334155;
        }
        #message-input {
            flex: 1;
            padding: 10px;
            background: #1e293b;
            border: 1px solid #475569;
            color: white;
            border-radius: 5px;
            outline: none;
        }
        #send-btn {
            background: #38bdf8;
            border: none;
            color: white;
            padding: 10px 20px;
            margin-left: 10px;
            border-radius: 5px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div id="chat-container"></div>
    <div id="input-area">
        <input type="text" id="message-input" placeholder="Type 'protocol' to get an action plan...">
        <button id="send-btn">Send</button>
    </div>

    <script>
        const socket = io("http://127.0.0.1:5000");
        const chatContainer = document.getElementById('chat-container');
        const input = document.getElementById('message-input');
        const sendBtn = document.getElementById('send-btn');

        function addMessage(text, sender) {
            const msgDiv = document.createElement('div');
            msgDiv.className = 'message ' + sender;
            msgDiv.textContent = text;
            chatContainer.appendChild(msgDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        sendBtn.addEventListener('click', () => {
            const msg = input.value.trim();
            if (msg) {
                addMessage(msg, 'user');
                socket.emit('chat_message', { message: msg });
                input.value = '';
            }
        });

        socket.on('chat_response', (data) => {
            addMessage(data.message, 'bot');
        });
    </script>
</body>
</html>
